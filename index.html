<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OS Memory Visualizer Pro</title>
<script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com/)"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
body { font-family: 'Inter', sans-serif; background-color: #f0f2f5; }
.glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
.cell-transition { transition: all 0.3s ease; }
.hit-bg { background-color: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
.miss-bg { background-color: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
</style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
    <header class="mb-8 text-center">
        <h1 class="text-4xl font-extrabold text-slate-800 tracking-tight">Virtual Memory Simulator</h1>
        <p class="text-slate-500 mt-2 text-lg">Visualizing Page Replacement Algorithms (FIFO, LRU, Optimal)</p>
    </header>

    <div class="glass-card rounded-2xl p-6 shadow-xl mb-8 grid grid-cols-1 md:grid-cols-3 gap-6 items-end">
        <div class="md:col-span-2">
            <label class="block text-sm font-semibold text-slate-700 mb-2">Reference String (Page Requests)</label>
            <input type="text" id="refString" value="7, 0, 1, 2, 0, 3, 0, 4, 2, 3, 0, 3, 2"
                class="w-full p-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none transition">
        </div>
        <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">Number of Frames (RAM Slots)</label>
            <input type="number" id="frames" value="3" min="1" max="7"
                class="w-full p-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <button onclick="simulateAll()" class="md:col-span-3 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow-lg transition transform hover:-translate-y-1">
            Generate Simulation Analysis
        </button>
    </div>

    <div id="displayArea" class="space-y-12">
        <div class="text-center py-20 text-slate-400">
            <p>Enter data and click "Generate" to see the magic happen.</p>
        </div>
    </div>
</div>

<script>
    function simulateAll() {
        const rawInput = document.getElementById('refString').value;
        const frameCount = parseInt(document.getElementById('frames').value);
        const pages = rawInput.split(',').map(s => s.trim()).filter(s => s !== "").map(Number);

        const area = document.getElementById('displayArea');
        area.innerHTML = '';

        const algorithms = ['FIFO', 'LRU', 'Optimal'];
        algorithms.forEach(algo => {
            const result = runAlgo(algo, pages, frameCount);
            renderUI(algo, pages, result, area);
        });
    }

    function runAlgo(name, pages, capacity) {
        let frames = [];
        let faults = 0;
        let steps = [];

        pages.forEach((page, i) => {
            let hit = frames.includes(page);
            let replaced = null;

            if (!hit) {
                faults++;
                if (frames.length < capacity) {
                    frames.push(page);
                } else {
                    let idxToReplace = 0;
                    if (name === 'FIFO') {
                        replaced = frames.shift();
                        frames.push(page);
                    } else if (name === 'LRU') {
                        const past = pages.slice(0, i);
                        replaced = frames.reduce((a, b) => past.lastIndexOf(a) < past.lastIndexOf(b) ? a : b);
                        frames[frames.indexOf(replaced)] = page;
                    } else { // Optimal
                        const future = pages.slice(i + 1);
                        replaced = frames.find(f => !future.includes(f));
                        if (!replaced) {
                            replaced = frames.reduce((a, b) => future.indexOf(a) > future.indexOf(b) ? a : b);
                        }
                        frames[frames.indexOf(replaced)] = page;
                    }
                }
            }
            steps.push({ page, currentFrames: [...frames], hit, replaced });
        });
        return { steps, faults };
    }

    function renderUI(name, pages, data, container) {
        const section = document.createElement('div');
        section.className = "glass-card rounded-2xl shadow-lg overflow-hidden border border-slate-200";

        const hitRate = (((pages.length - data.faults) / pages.length) * 100).toFixed(1);

        let html = `
            <div class="bg-slate-800 p-4 flex justify-between items-center text-white">
                <h2 class="text-xl font-bold uppercase tracking-widest">${name} Algorithm</h2>
                <div class="flex gap-4 text-sm">
                    <span>Faults: <b class="text-red-400">${data.faults}</b></span>
                    <span>Hit Rate: <b class="text-green-400">${hitRate}%</b></span>
                </div>
            </div>
            <div class="p-6 overflow-x-auto">
                <table class="w-full border-collapse">
                    <thead>
                        <tr class="text-slate-500 text-xs uppercase">
                            <th class="p-2 border-b text-left">Pages</th>
                            ${pages.map(p => `<th class="p-2 border-b">${p}</th>`).join('')}
                        </tr>
                    </thead>
                    <tbody>`;

        // Render Frame Rows
        const maxFrames = Math.max(...data.steps.map(s => s.currentFrames.length));
        for (let f = 0; f < maxFrames; f++) {
            html += `<tr><td class="p-2 text-xs font-bold text-slate-400">Slot ${f+1}</td>`;
            data.steps.forEach(step => {
                const val = step.currentFrames[f] !== undefined ? step.currentFrames[f] : '-';
                html += `<td class="p-2 text-center font-mono font-bold border-t border-slate-100">${val}</td>`;
            });
            html += `</tr>`;
        }

        // Render Result Row
        html += `<tr class="bg-slate-50">
                    <td class="p-3 text-xs font-bold text-slate-400">Status</td>
                    ${data.steps.map(s => `
                        <td class="p-2 text-center">
                            <span class="px-2 py-1 rounded-md text-[10px] font-bold ${s.hit ? 'hit-bg' : 'miss-bg'}">
                                ${s.hit ? 'HIT' : 'MISS'}
                            </span>
                        </td>
                    `).join('')}
                </tr>
            </tbody>
        </table>
    </div>`;

        section.innerHTML = html;
        container.appendChild(section);
    }
</script>
</body>
</html>
